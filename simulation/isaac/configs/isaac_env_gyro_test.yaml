# Isaac Sim environment config — gyro precession diagnostic (zero-g, single env)
# Usage: python -m simulation.isaac.scripts.diag_gyro_precession --config simulation/isaac/configs/isaac_env_gyro_test.yaml

num_envs: 1
episode_length_steps: 600          # 5 s at 1/120 s per step

# Physics — gravity disabled for isolated precession test
physics_dt: 0.008333               # 1/120 s
decimation: 1                      # policy step = 1 physics step
num_physics_substeps: 4            # PhysX TGS substeps per physics step

# Zero gravity: isolates gyroscopic precession from gravitational torques
gravity: [0.0, 0.0, 0.0]

# Spawn ranges
spawn_altitude_range: [5.0, 5.0]        # m above ground (fixed for diagnostic)
spawn_velocity_magnitude_range: [0.0, 0.0]  # zero initial velocity

# Target
target_position: [0.0, 0.0, 0.0]  # landing pad centre (world frame)

# Config paths (relative to repo root)
vehicle_config_path: simulation/configs/default_vehicle.yaml
domain_randomization_config_path: simulation/configs/domain_randomization.yaml
reward_config_path: simulation/configs/reward.yaml

# USD asset
drone_usd_path: simulation/isaac/usd/drone_v2_physics.usdc
