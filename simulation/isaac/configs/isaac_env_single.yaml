# Isaac Sim environment config — single env (PID tuning / visual inspection)
# Usage: python -m simulation.isaac.scripts.diag_isaac_single --config simulation/isaac/configs/isaac_env_single.yaml

num_envs: 1
episode_length_steps: 600          # 5 s at 1/120 s per step

# Physics
physics_dt: 0.008333               # 1/120 s
decimation: 1                      # policy step = 1 physics step
num_physics_substeps: 4            # PhysX TGS substeps per physics step (eff. dt ≈ 2.08 ms)

# Spawn ranges
spawn_altitude_range: [5.0, 10.0]        # m above ground
spawn_velocity_magnitude_range: [0.0, 5.0]  # m/s initial speed magnitude

# Target
target_position: [0.0, 0.0, 0.0]  # landing pad centre (world frame)

# Config paths (relative to repo root)
vehicle_config_path: simulation/configs/default_vehicle.yaml
domain_randomization_config_path: simulation/configs/domain_randomization.yaml
reward_config_path: simulation/configs/reward.yaml

# USD asset (generated by drone_builder.py)
drone_usd_path: simulation/isaac/usd/drone.usd
