# Isaac Sim environment config — 1024 parallel envs (maximum throughput)
# NOTE: May approach VRAM limit on RTX 5070 (12 GB). Monitor usage.
#       Prefer isaac_env_training.yaml (256 envs) for safe default training.
# Usage: python -m simulation.isaac.scripts.benchmark_envs

num_envs: 1024
episode_length_steps: 600          # 5 s at 1/120 s per step

# Physics
physics_dt: 0.008333               # 1/120 s
decimation: 1
num_physics_substeps: 4

# Spawn ranges
spawn_altitude_range: [5.0, 10.0]
spawn_velocity_magnitude_range: [0.0, 5.0]

# Target
target_position: [0.0, 0.0, 0.0]

# Config paths
vehicle_config_path: simulation/configs/default_vehicle.yaml
domain_randomization_config_path: simulation/configs/domain_randomization.yaml
reward_config_path: simulation/configs/reward.yaml

# USD asset
drone_usd_path: simulation/isaac/usd/drone_v2.usdc
