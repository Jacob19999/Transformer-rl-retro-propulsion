pid:
  # Baseline gains (training.md §15.5). These are initial values and are expected
  # to be refined in Stage 18 (linearization + Ziegler-Nichols + grid search).
  #
  # Note: The controller outputs normalized actions in [-1, 1]^5. These gains are
  # therefore "normalized-space" starting points, not guaranteed physical units.
  #
  # Design rationale (vehicle ~3.1 kg, T_hover ~30.7 N, throttle_range 0.5):
  #   Altitude  – Kp sized for near-critical damping with the current fin authority;
  #               Kd uses measured body-frame descent rate for smooth damping;
  #               Ki provides steady-state authority to push through the last cm.
  #               max_error clamps large position errors to keep the P-term
  #               in its linear region.
  #   Lateral   – Kd subtracts body velocity (damping, not positive feedback).
  #   Inner     – Gains scaled for enlarged fins (chord 65mm, span 55mm, offset 55mm).
  #               Kff compensates gyroscopic cross-coupling from the spinning fan.

  # Controller update timestep (policy rate)
  dt: 0.025

  # Used to normalize fin deflection commands to [-1, 1]
  delta_max: 0.349  # rad (~20°, matching servo max_deflection)

  # Maximum change in normalised thrust action per step.  Keeps motor
  # reaction torque within the yaw control authority of the fins.
  thrust_rate_limit: 0.10

  outer_loop:
    altitude:
      Kp: 0.50
      Ki: 0.175
      Kd: 0.40
      max_error: 2.0            # clamp alt error to prevent thrust saturation
      integral_limit: 1.0       # anti-windup clamp (integral state limit)
      target_h_agl: 0.0         # default: land at ground level
    lateral_x:
      Kp: 0.15
      Kd: 0.25
    lateral_y:
      Kp: 0.15
      Kd: 0.25
    max_tilt_cmd_deg: 15.0      # clamp commanded roll/pitch

  inner_loop:
    roll:
      Kp: 0.25
      Kd: 0.10
    pitch:
      Kp: 0.25
      Kd: 0.10
    gyro_ff: 0.020             # feedforward gain for gyroscopic cross-coupling
                               # Theoretical value: I_fan*omega_hover/K_tau ≈ 0.019
    yaw_Kd: 0.50               # yaw rate damping
    yaw_lp_hz: 0.0             # 0 = no filter on omega_z
    max_yaw_frac: 0.40         # fraction of delta_max reserved for yaw damping

  gain_schedule:
    enabled: true
    phases:
      - name: descent
        altitude_range: [2.0, 100.0]
        gain_scale: 1.0
      - name: approach
        altitude_range: [0.5, 2.0]
        gain_scale: 0.85
      - name: terminal
        altitude_range: [0.0, 0.5]
        gain_scale: 0.70
